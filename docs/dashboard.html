<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>repo-intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root{
    --ink:#0F1419; --panel:#171D26; --panel2:#1E2531; --line:#283140;
    --text:#E6E9EE; --muted:#8B97A7; --faint:#5C6675;
    --teal:#4FD1C5; --amber:#F2A65A;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--text);font-family:var(--body);
       -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 24px 64px}

  header.bar{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
       padding-bottom:16px;border-bottom:1px solid var(--line)}
  .repo-name{font-family:var(--disp);font-weight:600;font-size:26px;letter-spacing:-0.01em}
  .repo-name::before{content:"›";color:var(--teal);margin-right:8px}
  .meta{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .meta b{color:var(--text);font-weight:500}
  .meta .dot{color:var(--faint);margin:0 8px}

  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0 26px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px}
  .card .num{font-family:var(--disp);font-weight:600;font-size:30px;letter-spacing:-0.02em}
  .card .lbl{font-family:var(--mono);font-size:11px;text-transform:uppercase;
       letter-spacing:0.08em;color:var(--muted);margin-top:4px}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px}
  .ph{display:flex;align-items:center;justify-content:space-between;
       padding:14px 18px;border-bottom:1px solid var(--line)}
  .ph h2{margin:0;font-family:var(--disp);font-weight:500;font-size:15px}
  .ph .hint{font-family:var(--mono);font-size:11px;color:var(--faint)}

  #graph{width:100%;height:520px;display:block;cursor:grab}
  #graph:active{cursor:grabbing}
  .link{stroke:var(--teal);stroke-opacity:0.16}
  .node{cursor:pointer;stroke:var(--ink);stroke-width:1.5px}
  .node:hover{stroke:#fff;stroke-width:2px}
  .nlabel{font-family:var(--mono);font-size:10px;fill:var(--muted);pointer-events:none}

  .tip{position:fixed;pointer-events:none;opacity:0;transition:opacity .12s;z-index:10;
       background:#0A0E12;border:1px solid var(--line);border-radius:8px;padding:10px 12px;
       font-family:var(--mono);font-size:11.5px;max-width:320px}
  .tip .p{color:var(--text);word-break:break-all;margin-bottom:6px;font-weight:500}
  .tip .r{color:var(--muted)}
  .tip .r span{color:var(--text)}

  .grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-top:18px}
  @media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}

  .langrow{display:flex;align-items:center;gap:12px;padding:9px 18px;font-size:13px}
  .langrow:not(:last-child){border-bottom:1px solid var(--line)}
  .langrow .nm{width:96px;font-weight:500}
  .langrow .barwrap{flex:1;height:7px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .langrow .bar{height:100%;background:var(--teal);border-radius:4px}
  .langrow .v{font-family:var(--mono);font-size:11px;color:var(--muted);width:74px;text-align:right}

  .filerow{display:flex;align-items:center;gap:10px;padding:8px 18px;font-family:var(--mono);font-size:12px}
  .filerow:not(:last-child){border-bottom:1px solid var(--line)}
  .filerow .fp{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:left}
  .filerow .heat{width:60px;height:6px;border-radius:3px;background:var(--amber)}
  .filerow .c{color:var(--muted);width:42px;text-align:right}
  .legend{font-family:var(--mono);font-size:11px;color:var(--faint);margin:10px 2px 0;display:flex;gap:18px;align-items:center}
  .swatch{display:inline-block;width:34px;height:8px;border-radius:4px;vertical-align:middle;margin-right:6px;
       background:linear-gradient(90deg,var(--teal),var(--amber))}
</style>
</head>
<body>
<div class="wrap">
  <header class="bar">
    <div class="repo-name" id="repoName"></div>
    <div class="meta" id="repoMeta"></div>
  </header>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <div class="ph">
      <h2>Module dependency graph</h2>
      <div class="hint" id="graphHint"></div>
    </div>
    <svg id="graph"></svg>
  </div>
  <div class="legend">
    <span><span class="swatch"></span>color = commit activity (cool → hot)</span>
    <span>node size = lines of code</span>
    <span>edges = imports</span>
  </div>

  <div class="grid2">
    <div class="panel">
      <div class="ph"><h2>Language composition</h2><div class="hint">by lines of code</div></div>
      <div id="langs"></div>
    </div>
    <div class="panel">
      <div class="ph"><h2>Most active files</h2><div class="hint">by commit count</div></div>
      <div id="hot"></div>
    </div>
  </div>
</div>

<div class="tip" id="tip"></div>

<script>
const DATA = {"schema_version": 1, "repo": {"name": "ticket-sys", "path": "/home/hartley/projects/personal/ticket-sys", "branch": "main", "head": "91aaf45", "total_commits": 6, "generated_at": "2026-06-13 21:44 UTC"}, "package_roots": {}, "stats": {"file_count": 46, "total_loc": 1731, "contributor_count": 2, "edge_count": 0}, "languages": [{"name": "Python", "files": 10, "loc": 788}, {"name": "Markdown", "files": 16, "loc": 450}, {"name": "Other", "files": 7, "loc": 246}, {"name": "HTML", "files": 1, "loc": 203}, {"name": "Shell", "files": 2, "loc": 44}, {"name": "Config", "files": 10, "loc": 0}], "files": [{"path": ".cursor/cli.json", "lang": "Config", "loc": 0, "size": 274, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".cursor/hooks.json", "lang": "Config", "loc": 0, "size": 222, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".cursor/hooks/post-pr-sync.sh", "lang": "Shell", "loc": 14, "size": 486, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".env.example", "lang": "Other", "loc": 5, "size": 184, "commits": 2, "last_commit": "2026-06-13"}, {"path": ".github/workflows/executor.yml", "lang": "Config", "loc": 0, "size": 1714, "commits": 2, "last_commit": "2026-06-13"}, {"path": ".github/workflows/pages.yml", "lang": "Config", "loc": 0, "size": 771, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".github/workflows/radar-tickets.yml", "lang": "Config", "loc": 0, "size": 1992, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".github/workflows/radar.yml", "lang": "Config", "loc": 0, "size": 1419, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".github/workflows/scan-and-docs.yml", "lang": "Config", "loc": 0, "size": 902, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".github/workflows/test.yml", "lang": "Config", "loc": 0, "size": 161, "commits": 1, "last_commit": "2026-06-13"}, {"path": ".gitignore", "lang": "Other", "loc": 4, "size": 39, "commits": 1, "last_commit": "2026-06-13"}, {"path": "AGENTS.md", "lang": "Markdown", "loc": 35, "size": 1480, "commits": 1, "last_commit": "2026-06-13"}, {"path": "HANDOFF.md", "lang": "Markdown", "loc": 206, "size": 9834, "commits": 1, "last_commit": "2026-06-13"}, {"path": "README.md", "lang": "Markdown", "loc": 76, "size": 2847, "commits": 2, "last_commit": "2026-06-13"}, {"path": "docgen.py", "lang": "Python", "loc": 101, "size": 2715, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/dashboard.html", "lang": "HTML", "loc": 203, "size": 10812, "commits": 2, "last_commit": "2026-06-13"}, {"path": "docs/index.db", "lang": "Other", "loc": 0, "size": 28672, "commits": 2, "last_commit": "2026-06-13"}, {"path": "docs/index.json", "lang": "Config", "loc": 0, "size": 1384, "commits": 2, "last_commit": "2026-06-13"}, {"path": "docs/modules/docgen.md", "lang": "Markdown", "loc": 11, "size": 208, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/draft_issues.md", "lang": "Markdown", "loc": 11, "size": 213, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/run_tests.md", "lang": "Markdown", "loc": 11, "size": 210, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/scan.md", "lang": "Markdown", "loc": 11, "size": 206, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/src-mypkg-core.md", "lang": "Markdown", "loc": 11, "size": 207, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/src-mypkg.md", "lang": "Markdown", "loc": 11, "size": 202, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/test-repos-srcpkg-src-mypkg-core.md", "lang": "Markdown", "loc": 11, "size": 232, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/test-repos-srcpkg-src-mypkg.md", "lang": "Markdown", "loc": 11, "size": 227, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/test-repos-srcpkg-tests-test_core.md", "lang": "Markdown", "loc": 11, "size": 233, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/tests-test_core.md", "lang": "Markdown", "loc": 11, "size": 208, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/tests-test_docgen.md", "lang": "Markdown", "loc": 11, "size": 218, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/modules/tests-test_scan.md", "lang": "Markdown", "loc": 11, "size": 216, "commits": 1, "last_commit": "2026-06-13"}, {"path": "docs/radar/README.md", "lang": "Markdown", "loc": 1, "size": 92, "commits": 1, "last_commit": "2026-06-13"}, {"path": "draft_issues.py", "lang": "Python", "loc": 40, "size": 1141, "commits": 1, "last_commit": "2026-06-13"}, {"path": "hooks/post-checkout", "lang": "Other", "loc": 16, "size": 398, "commits": 1, "last_commit": "2026-06-13"}, {"path": "hooks/post-merge", "lang": "Other", "loc": 5, "size": 176, "commits": 1, "last_commit": "2026-06-13"}, {"path": "hooks/pre-commit", "lang": "Other", "loc": 13, "size": 384, "commits": 1, "last_commit": "2026-06-13"}, {"path": "hooks/sync-origin-main.sh", "lang": "Shell", "loc": 30, "size": 723, "commits": 1, "last_commit": "2026-06-13"}, {"path": "run_tests.py", "lang": "Python", "loc": 15, "size": 347, "commits": 1, "last_commit": "2026-06-13"}, {"path": "scan.py", "lang": "Python", "loc": 499, "size": 17131, "commits": 1, "last_commit": "2026-06-13"}, {"path": "templates/dashboard.html.tmpl", "lang": "Other", "loc": 203, "size": 9808, "commits": 1, "last_commit": "2026-06-13"}, {"path": "test-repos/srcpkg/pyproject.toml", "lang": "Config", "loc": 0, "size": 138, "commits": 1, "last_commit": "2026-06-13"}, {"path": "test-repos/srcpkg/src/mypkg/__init__.py", "lang": "Python", "loc": 5, "size": 92, "commits": 1, "last_commit": "2026-06-13"}, {"path": "test-repos/srcpkg/src/mypkg/core.py", "lang": "Python", "loc": 5, "size": 78, "commits": 1, "last_commit": "2026-06-13"}, {"path": "test-repos/srcpkg/tests/test_core.py", "lang": "Python", "loc": 5, "size": 92, "commits": 1, "last_commit": "2026-06-13"}, {"path": "tests/test_docgen.py", "lang": "Python", "loc": 48, "size": 1476, "commits": 1, "last_commit": "2026-06-13"}, {"path": "tests/test_hooks.py", "lang": "Python", "loc": 27, "size": 798, "commits": 1, "last_commit": "2026-06-13"}, {"path": "tests/test_scan.py", "lang": "Python", "loc": 43, "size": 1396, "commits": 1, "last_commit": "2026-06-13"}], "edges": []};
const fmt = n => n.toLocaleString();

// header
document.getElementById('repoName').textContent = DATA.repo.name;
document.getElementById('repoMeta').innerHTML =
  `<b>${DATA.repo.branch}</b> @ ${DATA.repo.head}` +
  `<span class="dot">·</span><b>${fmt(DATA.repo.total_commits)}</b> commits` +
  `<span class="dot">·</span>scanned ${DATA.repo.generated_at}`;

// cards
const cards = [
  ['file_count','files'],['total_loc','lines of code'],
  ['edge_count','import edges'],['contributor_count','contributors']
];
document.getElementById('cards').innerHTML = cards.map(([k,l]) =>
  `<div class="card"><div class="num">${fmt(DATA.stats[k])}</div><div class="lbl">${l}</div></div>`).join('');

// languages
const maxLoc = Math.max(...DATA.languages.map(l=>l.loc), 1);
document.getElementById('langs').innerHTML = DATA.languages.filter(l=>l.loc>0).slice(0,9).map(l=>
  `<div class="langrow"><span class="nm">${l.name}</span>
     <span class="barwrap"><span class="bar" style="width:${(l.loc/maxLoc*100).toFixed(1)}%"></span></span>
     <span class="v">${fmt(l.loc)}</span></div>`).join('');

// most active files
const hot = [...DATA.files].sort((a,b)=>b.commits-a.commits).slice(0,12);
const maxC = Math.max(...hot.map(f=>f.commits),1);
document.getElementById('hot').innerHTML = hot.map(f=>
  `<div class="filerow"><span class="fp" title="${f.path}">${f.path}</span>
     <span class="heat" style="width:${Math.max(8,f.commits/maxC*60)}px"></span>
     <span class="c">${f.commits}</span></div>`).join('');

// ---- knowledge graph ----
const GRAPH_LANGS = new Set(['Python','JavaScript','TypeScript']);
const present = new Set();
DATA.edges.forEach(e=>{present.add(e.source);present.add(e.target);});
let nodes = DATA.files.filter(f => GRAPH_LANGS.has(f.lang) && (present.has(f.path) || f.loc>0));
nodes = nodes.sort((a,b)=>b.loc-a.loc).slice(0,200);
const keep = new Set(nodes.map(n=>n.path));
const links = DATA.edges.filter(e=>keep.has(e.source)&&keep.has(e.target))
                        .map(e=>({source:e.source,target:e.target}));
nodes = nodes.map(n=>({...n,id:n.path}));

document.getElementById('graphHint').textContent = `${nodes.length} modules · ${links.length} edges`;

const svg = d3.select('#graph');
const W = svg.node().clientWidth, H = svg.node().clientHeight;
const maxChurn = Math.max(...nodes.map(n=>n.commits),1);
const maxNLoc = Math.max(...nodes.map(n=>n.loc),1);
const rOf = d3.scaleSqrt().domain([0,maxNLoc]).range([4,22]);
const cOf = d3.scaleSqrt().domain([0,maxChurn]).range([0,1]);
const heat = t => d3.interpolateRgb('#4FD1C5','#F2A65A')(t);

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(46).strength(0.35))
  .force('charge', d3.forceManyBody().strength(-90))
  .force('center', d3.forceCenter(W/2,H/2))
  .force('collide', d3.forceCollide().radius(d=>rOf(d.loc)+3));

const link = svg.append('g').selectAll('line').data(links).join('line').attr('class','link');
const node = svg.append('g').selectAll('circle').data(nodes).join('circle')
  .attr('class','node').attr('r',d=>rOf(d.loc)).attr('fill',d=>heat(cOf(d.commits)))
  .call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

const label = svg.append('g').selectAll('text').data(nodes.filter(d=>rOf(d.loc)>=12))
  .join('text').attr('class','nlabel').attr('text-anchor','middle').attr('dy','-1.1em')
  .text(d=>d.path.split('/').pop());

const tip = document.getElementById('tip');
node.on('mousemove',(e,d)=>{
    tip.style.opacity=1; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
    tip.innerHTML = `<div class="p">${d.path}</div>
      <div class="r">lang <span>${d.lang}</span> · loc <span>${fmt(d.loc)}</span></div>
      <div class="r">commits <span>${d.commits}</span> · last <span>${d.last_commit||'—'}</span></div>`;
  }).on('mouseleave',()=>tip.style.opacity=0);

sim.on('tick',()=>{
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  node.attr('cx',d=>d.x=Math.max(24,Math.min(W-24,d.x))).attr('cy',d=>d.y=Math.max(24,Math.min(H-24,d.y)));
  label.attr('x',d=>d.x).attr('y',d=>d.y);
});
</script>
</body>
</html>
