name: executor

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  workflows: write

jobs:
  run:
    if: github.event.label.name == 'radar:approved'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsSL | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Configure git
        run: |
          git config user.name "Cursor Agent"
          git config user.email "cursoragent@users.noreply.github.com"

      - name: Implement approved issue
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          git checkout -b "issue-${ISSUE_NUM}"
          cursor-agent -p --force --model composer-2.5 \
            "Read .github/EXECUTOR.md and AGENTS.md. Implement GitHub issue #${ISSUE_NUM}: ${ISSUE_TITLE}. \
             Make one git commit per logical change (feat/fix/test/docs/refactor) with (#${ISSUE_NUM}) in each message. \
             Run python3 run_tests.py before your final commit. Commit all changes — the workflow will not squash."

      - name: Verify branch and tests
        env:
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          chmod +x scripts/verify_executor_branch.sh
          scripts/verify_executor_branch.sh "${ISSUE_NUM}" main

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          git push -u origin "issue-${ISSUE_NUM}"
          COMMITS=$(git rev-list --count main..HEAD)
          cat > /tmp/pr-body.md <<EOF
          ## Summary

          Implements #${ISSUE_NUM}: ${ISSUE_TITLE}

          Executor branch contains **${COMMITS}** logical commit(s) (not squashed by CI).

          ## Test plan

          - [x] \`python3 run_tests.py\` (agent + verify step)

          Closes #${ISSUE_NUM}
          EOF
          gh pr create \
            --title "fix: #${ISSUE_NUM} ${ISSUE_TITLE}" \
            --body-file /tmp/pr-body.md \
            --head "issue-${ISSUE_NUM}" \
            --base main
