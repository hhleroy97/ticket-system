name: radar-tickets

on:
  push:
    branches: [main]
    paths:
      - "docs/radar/*.md"

permissions:
  issues: write

concurrency:
  group: radar-tickets
  cancel-in-progress: false

jobs:
  draft-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "radar:proposed" --color "fbca04" --description "RADAR draft — not actionable until approved" 2>/dev/null || true
          gh label create "radar:request" --color "c5def5" --description "Operator request — created from dashboard/CLI" 2>/dev/null || true
          gh label create "radar:approved" --color "0e8a16" --description "Human or auto approved — executor may run" 2>/dev/null || true
          gh label create "radar:auto-merge" --color "1d76db" --description "Low risk — auto-merge executor PR when tests pass" 2>/dev/null || true

      - name: Find latest dated RADAR file
        id: radar
        run: |
          FILE=$(ls -1 docs/radar/[0-9][0-9][0-9][0-9]-*.md 2>/dev/null | tail -1)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Create proposed issues (deterministic)
        if: steps.radar.outputs.file != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/create_radar_issues.py
          python3 scripts/create_radar_issues.py "${{ steps.radar.outputs.file }}"
