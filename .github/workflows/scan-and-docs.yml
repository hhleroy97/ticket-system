name: scan-and-docs

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".github/**"

permissions:
  contents: write

concurrency:
  group: scan-docs-push-main
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Scan and generate module docs
        env:
          TARGET_REPO: ${{ github.workspace }}
        run: |
          python3 scan.py
          python3 scripts/github_intel.py
          python3 docgen.py

      - name: Run tests
        run: python3 run_tests.py

      - name: Push refreshed docs to main
        run: |
          chmod +x scripts/push_to_main.sh
          scripts/push_to_main.sh "docs: refresh scan index and module summaries" docs/
