name: radar

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-push-main
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Scan and generate RADAR report
        env:
          TARGET_REPO: ${{ github.workspace }}
        run: |
          python3 scan.py
          python3 radar_report.py

      - name: Run tests
        run: python3 run_tests.py

      - name: Push findings to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/push_to_main.sh
          DATE=$(date -u +%Y-%m-%d)
          scripts/push_to_main.sh "radar: weekly findings ${DATE}" docs/
