name: radar

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan and generate RADAR report
        env:
          TARGET_REPO: ${{ github.workspace }}
        run: |
          python3 scan.py
          python3 radar_report.py

      - name: Open PR with findings
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "radar: weekly findings"
          title: "radar: weekly research findings"
          body: |
            Deterministic RADAR output from `radar_report.py` (no LLM).
            Auto-merge will land this when tests pass if changes are docs-only.
          branch: bot/radar-findings
          delete-branch: true
