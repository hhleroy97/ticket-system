name: radar

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: radar-push-main
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Scan and generate RADAR report
        env:
          TARGET_REPO: ${{ github.workspace }}
        run: |
          python3 scan.py
          python3 scripts/github_intel.py
          python3 radar_report.py

      - name: Run tests
        run: python3 run_tests.py

      - name: Push findings to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/push_to_main.sh
          DATE=$(date -u +%Y-%m-%d)
          scripts/push_to_main.sh "radar: weekly findings ${DATE}" docs/

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "radar:proposed" --color "fbca04" --description "RADAR draft — not actionable until approved" 2>/dev/null || true
          gh label create "radar:approved" --color "0e8a16" --description "Human or auto approved — executor may run" 2>/dev/null || true
          gh label create "radar:auto-merge" --color "1d76db" --description "Low risk — auto-merge executor PR when tests pass" 2>/dev/null || true

      - name: Create RADAR issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/create_radar_issues.py
          FILE=$(ls -1 docs/radar/[0-9][0-9][0-9][0-9]-*.md | tail -1)
          python3 scripts/create_radar_issues.py "$FILE"
